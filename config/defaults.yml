---
# planwright default configuration — tracked, universal defaults only (D-33).
#
# Per-repo/personal overrides live in <repo>/.claude/planwright.local.yml
# (agent-maintained, gitignored; per-repo entries are written only on human
# confirmation, REQ-K1.1). Local values win over these defaults.
#
# Every option here MUST have a row in docs/options-reference.md (D-43,
# REQ-K1.8); scripts/check-options-reference.sh enforces it (CI wiring: Task 2).

# Auto-commit toggles for completed state transitions (D-41). Commit only,
# never push; push, sign-off, and merge remain human-reserved.
commit_on_draft: true
commit_on_kickoff: true
commit_on_state_move: true

# Whether /spec-kickoff marks the spec PR ready as the terminal step of a clean
# kickoff completion (D-6, D-7; REQ-D1.2, REQ-D1.3) — the narrow exception to
# bootstrap D-26's all-drafts rule (only the spec PR; task PRs stay drafts; merge
# stays human, never auto-merge). false leaves the spec PR draft for the human to
# un-draft by hand. The flip never fires when sign-off parked on a fork or the
# configured review_sequence verification did not converge, regardless of this
# value.
mark_spec_pr_ready_on_kickoff: true

# Dispatch layer (D-38, REQ-F1.8).
dispatch_backend: subagent
max_parallel_units: 3

# Per-spec advisory lock staleness threshold for /orchestrate (D-10).
stale_lock_threshold: 15m

# Runtime dispatch-marker staleness threshold (orchestration-concurrency D-3).
# A timestamped marker older than this whose branch carries no commits is
# treated as stale: the task-state derivation reverts the task to Ready, so a
# dispatch that crashed before its first commit cannot wedge the task In
# progress. Safe to revert because dispatch writes no authoritative state (D-1).
stale_marker_threshold: 15m

# The ordered review sequence /execute-task's convergence phase runs (D-6,
# REQ-D1.3). An inline list of nestable review-skill names (a nestable review
# skill is one invocable with --nested). The default reproduces today's
# convergence behavior — a single /polish --nested pass — so out-of-the-box
# behavior is unchanged; an overlay can reorder or extend it (e.g.
# [self-review, polish]) once the named skills exist. Resolved through
# scripts/resolve-review-sequence.sh, which validates each name and applies the
# REQ-E1.4 malformed-by-layer policy to an unknown or non-nestable name.
review_sequence: [polish]
