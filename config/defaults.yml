---
# planwright default configuration — tracked, universal defaults only (D-33).
#
# Per-repo/personal overrides live in <repo>/.claude/planwright.local.yml
# (agent-maintained, gitignored; per-repo entries are written only on human
# confirmation, REQ-K1.1). Local values win over these defaults.
#
# Every option here MUST have a row in docs/options-reference.md (D-43,
# REQ-K1.8); scripts/check-options-reference.sh enforces it (CI wiring: Task 2).

# Auto-commit toggles for completed state transitions (D-41). Commit only,
# never push; push, sign-off, and merge remain human-reserved.
commit_on_draft: true
commit_on_kickoff: true
commit_on_state_move: true

# Whether /spec-kickoff marks the spec PR ready as the terminal step of a clean
# kickoff completion (D-6, D-7; REQ-D1.2, REQ-D1.3) — the narrow exception to
# bootstrap D-26's all-drafts rule (only the spec PR; task PRs stay drafts; merge
# stays human, never auto-merge). false leaves the spec PR draft for the human to
# un-draft by hand. The flip never fires when sign-off parked on a fork or the
# configured review_sequence verification did not converge, regardless of this
# value.
mark_spec_pr_ready_on_kickoff: true

# Dispatch layer (D-38, REQ-F1.8). Each backend value maps to an advertised
# capability set defined by doctrine/backend-capability-contract.md (D-2), which
# specifies how the orchestrator is to adapt to what is advertised rather than
# special-casing backends by name (contract defined there; the dispatch layer is
# still backend-keyed pending that wiring).
dispatch_backend: subagent
max_parallel_units: 3

# Fleet-level concurrency bound for the meta-tower ("tower of towers",
# /orchestrate --meta, D-6, REQ-D1.5). Caps the TOTAL number of in-flight
# execution units summed across ALL specs the meta-tower supervises — distinct
# from max_parallel_units, which caps one spec. The safe default is
# conservative: 3 holds total fleet concurrency to a single spec's worth, so
# enabling the (opt-in) meta-tower never multiplies load until an operator
# raises it. Resolved through scripts/orchestrate-meta-select.sh via config-get;
# an absent key keeps this default, a malformed value warns and falls back.
fleet_max_parallel_units: 3

# How /execute-task sequences a unit's steps (D-5, REQ-C1.3). `per-step` runs
# implementation and each configured review_sequence skill in its own fresh
# /resume-seeded session, so context stays bounded and each review's perspective
# is uncontaminated by prior steps; backends that cannot spawn a fresh session
# approximate it (the synchronous terminal rung via context clears between
# steps). `per-unit` keeps today's single-session behavior (one worker session
# for the whole unit). The default is the assigned human decision (`per-step`);
# `per-unit` remains supported for constrained hosts. Resolved through
# scripts/resolve-dispatch-isolation.sh, which validates the enum and applies
# the REQ-E1.4 by-layer malformed policy. (Flipping this default from the
# historical per-unit behavior is tracked cross-spec as the required bootstrap
# D-38 amendment — risk row R3.)
dispatch_isolation: per-step

# When a long-running tower auto-heals (D-4, REQ-C1.1). The value is a
# completed-step budget: the number of orchestration steps a tower runs before
# it hands off to a fresh tower (the continue-as-new pattern) so it never
# silently degrades from context exhaustion. The signal is a step-count proxy
# because Claude Code exposes no supported live context-usage introspection
# (Task 5 research): the transcript is internal/unstable and there is no env
# var, hook field, or CLI query for remaining budget. `off` disables auto-heal
# (the historical single-tower behavior). The default is conservative because
# the handover is cheap and lossless — the fresh tower rebuilds from durable
# state — so handing off early is the safe direction. Resolved through
# scripts/resolve-context-budget-threshold.sh, which validates the value (a
# positive integer or `off`) and applies the REQ-E1.4 by-layer malformed policy;
# scripts/context-budget-monitor.sh evaluates a step count against it. Adopters
# on roomier hosts can raise it; constrained hosts lower it.
context_budget_threshold: 50

# Per-spec advisory lock staleness threshold for /orchestrate (D-10).
stale_lock_threshold: 15m

# Runtime dispatch-marker staleness threshold (orchestration-concurrency D-3).
# A timestamped marker older than this whose branch carries no commits is
# treated as stale: the task-state derivation reverts the task to Ready, so a
# dispatch that crashed before its first commit cannot wedge the task In
# progress. Safe to revert because dispatch writes no authoritative state (D-1).
stale_marker_threshold: 15m

# Which channel the fleet attention/notification seam pushes a notification
# through (D-13, REQ-E1.4). This is the capability-vs-style split (REQ-A1.5):
# the notification SEAM lives in core; the specific channel VALUE is
# overlay-owned. `none` (default) is pull-only — nothing is pushed and the
# operator reads the decision queue (scripts/fleet-attention.sh queue) on
# demand; it is dependency-free and behavior-preserving, so it is the safe
# default. `tmux-popup` pushes a multiplexer popup (the multiplexer-user
# persona); `os-notify` an OS notification (the non-terminal-user persona);
# `editor-toast` an editor toast the editor tails (the editor-feedback persona).
# Resolved through scripts/resolve-notification-channel.sh, which validates the
# enum and applies the REQ-E1.4 by-layer malformed policy (degrade+warn for
# adopter/machine-local, hard-fail for repo-tracked); the channel adapters live
# in scripts/fleet-attention.sh (`notify`).
notification_channel: none

# The ordered review sequence /execute-task's convergence phase runs (D-6,
# REQ-D1.3). An inline list of nestable review-skill names (a nestable review
# skill is one invocable with --nested). The default reproduces today's
# convergence behavior — a single /polish --nested pass — so out-of-the-box
# behavior is unchanged; an overlay can reorder or extend it (e.g.
# [self-review, polish]) once the named skills exist. Resolved through
# scripts/resolve-review-sequence.sh, which validates each name and applies the
# REQ-E1.4 malformed-by-layer policy to an unknown or non-nestable name.
review_sequence: [polish]

# Release-tagging policy (autopilot-reflex D-4, D-13; REQ-D1.4, REQ-D1.6). The
# publish script (scripts/release-publish.sh) reads both knobs; the comparator
# (scripts/release-pending.sh) reads only version_file — signing is a
# publish-only concern. See doctrine/release-tagging.md for the altitude split
# (the capability is core, this is the value).

# Signing policy for the release tag (D-4, REQ-D1.4). `auto` (default) signs when
# the repo has signing configured (git user.signingkey), otherwise creates an
# annotated UNSIGNED tag with a warning; `require` refuses to tag unless signing
# is configured and succeeds; `never` always creates an unsigned annotated tag.
# Signing is delegated entirely to the repo's git config (gpg.format,
# user.signingkey, gpg.ssh.program) — no signer is named in the script, and no
# signing material ever enters CI. planwright's own repo sets `require` through a
# repo-level overlay (its signing enforcement lands with the signing task).
require_signed_tags: auto

# Where the version of truth lives (D-13, REQ-D1.6), as `<path>::<selector>`. The
# selector is `$.<key>` for a top-level JSON string field (extracted with jq, the
# key passed as data, never executed) or absent for a whole-file plain VERSION
# file. The `::` separator (not `#`) avoids config-get's YAML `#comment`
# stripping. The default reads $.version from the plugin manifest; override it to
# point at another top-level JSON string field (e.g. a package.json's $.version)
# or, with no selector, a plain VERSION file.
version_file: .claude-plugin/plugin.json::$.version

# Instruction-hygiene size budgets (prompt-hygiene D-1, D-2, D-5). The guard
# scripts/check-instructions.sh enforces these in words (wc -w, wrap-invariant);
# thresholds are boundary-inclusive (a count >= a threshold trips it). Defaults
# derive from the published 500-line SKILL.md authoring ceiling converted through
# the measured corpus density (~8.5 words/line in skills/, ~7.9 in doctrine/),
# recorded in D-2. Every knob is overlay-tunable; the mechanism is core, the
# values are style. See doctrine/instruction-hygiene.md for the budget model.
# Per-file floors (secondary signal): SKILL.md body and doctrine rule doc.
instruction_budget_skill_warn: 3000
instruction_budget_skill_error: 4250
instruction_budget_doctrine_warn: 2500
instruction_budget_doctrine_error: 4000
# Mandatory-at-start (the primary budget: SKILL.md body + run-start rule docs).
instruction_budget_startload_warn: 8000
instruction_budget_startload_error: 10000
# Reachable closure (start-load + point-of-use rule docs).
instruction_budget_closure_warn: 15000
instruction_budget_closure_error: 20000
# Injected-context warn floor (static prose an additionalContext-emitting hook
# contributes, REQ-A1.4/B1.7). Warn-only: this partly-dynamic per-session
# surface never fails the check. Grounded in the ~40-word present surface
# (tool-discovery.sh) plus headroom, same test-and-measure discipline (D-13).
instruction_budget_injected_warn: 200
