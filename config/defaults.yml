---
# planwright default configuration — tracked, universal defaults only (D-33).
#
# Per-repo/personal overrides live in <repo>/.claude/planwright.local.yml
# (agent-maintained, gitignored; per-repo entries are written only on human
# confirmation, REQ-K1.1). Local values win over these defaults.
#
# Every option here MUST have a row in docs/options-reference.md (D-43,
# REQ-K1.8); scripts/check-options-reference.sh enforces it (CI wiring: Task 2).

# Auto-commit toggles for completed state transitions (D-41). Commit only,
# never push; push, sign-off, and merge remain human-reserved.
commit_on_draft: true
commit_on_kickoff: true
commit_on_state_move: true

# Whether /spec-kickoff marks the spec PR ready as the terminal step of a clean
# kickoff completion (D-6, D-7; REQ-D1.2, REQ-D1.3) — the narrow exception to
# bootstrap D-26's all-drafts rule (only the spec PR; task PRs stay drafts; merge
# stays human, never auto-merge). false leaves the spec PR draft for the human to
# un-draft by hand. The flip never fires when sign-off parked on a fork or the
# configured review_sequence verification did not converge, regardless of this
# value.
mark_spec_pr_ready_on_kickoff: true

# The bounded wait /spec-kickoff's terminal ready-flip holds for the spec PR's
# head-SHA check rollup to complete before it marks the PR ready (skill-rigor
# D-3, REQ-B1.1). After the push, CI rarely reports within seconds, so the gate
# polls the head commit's statusCheckRollup (checks on the SHA, never PR review
# states — an errored or stale review must not masquerade as a completed check)
# at a bounded cadence (tens of queries per wait, not hundreds) up to this
# bound, flipping only on a positive green (at least one completed check and
# overall success); head identity is re-confirmed immediately before the flip
# (a moved head refuses). On red, empty, unresolved, a query failure, an expired
# wait, or a moved head it leaves the PR draft and records the pending
# ready-flip in tasks.md `## Awaiting input` (the re-entry point). Same `<n>[m]`
# minutes convention as the staleness knobs; an absent or malformed value falls
# back to the default with a one-line warning. Read by /spec-kickoff at
# pre-flight step 4 (alongside mark_spec_pr_ready_on_kickoff) and consumed at
# the sign-off terminal ready-flip (step 8); the gate is skipped when the
# upstream no-remote/no-PR degradation arm has already fired.
kickoff_ready_ci_wait: 10m

# Dispatch layer (D-38, REQ-F1.8). Each backend value maps to an advertised
# capability set defined by doctrine/backend-capability-contract.md (D-2), which
# specifies how the orchestrator is to adapt to what is advertised rather than
# special-casing backends by name (contract defined there; the dispatch layer is
# still backend-keyed pending that wiring).
dispatch_backend: subagent
max_parallel_units: 3

# Fleet-level concurrency bound for the meta-tower ("tower of towers",
# /orchestrate --meta, D-6, REQ-D1.5). Caps the TOTAL number of in-flight
# execution units summed across ALL specs the meta-tower supervises — distinct
# from max_parallel_units, which caps one spec. The safe default is
# conservative: 3 holds total fleet concurrency to a single spec's worth, so
# enabling the (opt-in) meta-tower never multiplies load until an operator
# raises it. Resolved through scripts/orchestrate-meta-select.sh via config-get;
# an absent key keeps this default, a malformed value warns and falls back.
fleet_max_parallel_units: 3

# How /execute-task sequences a unit's steps (D-5, REQ-C1.3). `per-step` runs
# implementation and each configured review_sequence skill in its own fresh
# /resume-seeded session, so context stays bounded and each review's perspective
# is uncontaminated by prior steps; backends that cannot spawn a fresh session
# approximate it (the synchronous terminal rung via context clears between
# steps). `per-unit` keeps today's single-session behavior (one worker session
# for the whole unit). The default is the assigned human decision (`per-step`);
# `per-unit` remains supported for constrained hosts. Resolved through
# scripts/resolve-dispatch-isolation.sh, which validates the enum and applies
# the REQ-E1.4 by-layer malformed policy. (Flipping this default from the
# historical per-unit behavior is tracked cross-spec as the required bootstrap
# D-38 amendment — risk row R3.)
dispatch_isolation: per-step

# When a long-running tower auto-heals (D-4, REQ-C1.1). The value is a
# completed-step budget: the number of orchestration steps a tower runs before
# it hands off to a fresh tower (the continue-as-new pattern) so it never
# silently degrades from context exhaustion. The signal is a step-count proxy
# because Claude Code exposes no supported live context-usage introspection
# (Task 5 research): the transcript is internal/unstable and there is no env
# var, hook field, or CLI query for remaining budget. `off` disables auto-heal
# (the historical single-tower behavior). The default is conservative because
# the handover is cheap and lossless — the fresh tower rebuilds from durable
# state — so handing off early is the safe direction. Resolved through
# scripts/resolve-context-budget-threshold.sh, which validates the value (a
# positive integer or `off`) and applies the REQ-E1.4 by-layer malformed policy;
# scripts/context-budget-monitor.sh evaluates a step count against it. Adopters
# on roomier hosts can raise it; constrained hosts lower it.
context_budget_threshold: 50

# Per-spec advisory lock staleness threshold for /orchestrate (D-10).
stale_lock_threshold: 15m

# Runtime dispatch-marker staleness threshold (orchestration-concurrency D-3).
# A timestamped marker older than this whose branch carries no commits is
# treated as stale: the task-state derivation reverts the task to Ready, so a
# dispatch that crashed before its first commit cannot wedge the task In
# progress. Safe to revert because dispatch writes no authoritative state (D-1).
stale_marker_threshold: 15m

# Bounded-fetch TTL for the fetch-before-gate dispatch primitive
# (scripts/dispatch-fetch.sh; fleet-hardening D-9, REQ-D1.1). Before the
# freshness gate and merge detection run, /orchestrate and /execute-task fetch
# `origin` so both evaluate against a current `origin/main` (never advancing
# local `main`). A successful fetch is stamped; a subsequent gate within this
# TTL reuses the stamp instead of re-fetching, so an `/orchestrate --watch` idle
# loop and the reconcile sweep coalesce onto one fetch rather than hitting the
# network every cycle. Same `<n>[m]` minutes convention as the staleness knobs
# above; the SECONDS env override PLANWRIGHT_DISPATCH_FETCH_TTL wins for tests.
dispatch_fetch_ttl: 2m

# Which channel the fleet attention/notification seam pushes a notification
# through (D-13, REQ-E1.4). This is the capability-vs-style split (REQ-A1.5):
# the notification SEAM lives in core; the specific channel VALUE is
# overlay-owned. `none` (default) is pull-only — nothing is pushed and the
# operator reads the decision queue (scripts/fleet-attention.sh queue) on
# demand; it is dependency-free and behavior-preserving, so it is the safe
# default. `tmux-popup` pushes a multiplexer popup (the multiplexer-user
# persona); `os-notify` an OS notification (the non-terminal-user persona);
# `editor-toast` an editor toast the editor tails (the editor-feedback persona);
# `statusline` renders the derived fleet stats natively in the operator's own
# Claude Code terminal via the statusLine feature (fleet-autonomy D-14; wire
# scripts/fleet-statusline.sh into settings.json — see docs/fleet.md).
# Resolved through scripts/resolve-notification-channel.sh, which validates the
# enum and applies the REQ-E1.4 by-layer malformed policy (degrade+warn for
# adopter/machine-local, hard-fail for repo-tracked); the channel adapters live
# in scripts/fleet-attention.sh (`notify`).
notification_channel: none

# The ordered review sequence /execute-task's convergence phase runs (D-6,
# REQ-D1.3). An inline list of nestable review-skill names (a nestable review
# skill is one invocable with --nested). The default reproduces today's
# convergence behavior — a single /polish --nested pass — so out-of-the-box
# behavior is unchanged; an overlay can reorder or extend it (e.g.
# [self-review, polish]) once the named skills exist. Resolved through
# scripts/resolve-review-sequence.sh, which validates each name and applies the
# REQ-E1.4 malformed-by-layer policy to an unknown or non-nestable name.
review_sequence: [polish]

# The operator kill-switch for the autonomous daemon layer (fleet-autonomy
# D-15, REQ-F1.3). `true` pauses every autonomous daemon action the fleet
# introduces (cleanup, restart, throttle) without disabling fleet operation
# entirely — one lever for an operator debugging something unusual, instead of
# N per-mechanism knobs to remember and re-enable. Task work (towers
# dispatching, workers executing) is unaffected. Every daemon mechanism this
# bundle introduces (Tasks 2-7) is contracted to check it through
# scripts/fleet-daemon-gate.sh BEFORE acting; the gate fails closed (an
# unresolvable switch blocks the action). Resolved through the shared knob
# resolver (scripts/resolve-config-knob.sh -> config-get, fleet-autonomy D-22,
# REQ-G1.5); a value other than true/false is malformed under the REQ-E1.4
# by-layer policy. The layers that can flip it are human-owned surfaces (the
# repo-tracked overlay is PR-reviewed; adopter/machine-local are operator
# files outside a dispatched worker's write allowlist) — the same
# human-reviewed posture config/worker-settings.json has.
fleet_daemon_pause: false

# The grace period the dirty-tree housekeeping sweep (fleet-autonomy D-8,
# REQ-B1.3; scripts/fleet-sweep.sh) waits before escalating a working tree that
# has uncommitted or unpushed changes — or that could not be inspected — to the
# decision queue. A tree must be CONTINUOUSLY in that state past this threshold
# before it is escalated, so an actively-worked tree is not flagged mid-edit and
# a transient git-lock contention self-resolves by the next sweep. Minutes, with
# an optional `m` suffix (the stale_*_threshold convention); an absent or
# malformed value falls back to 15m. Resolved through config-get across the
# overlay layers, so an adopter on a slower cadence can raise it. The sweep's
# scope (every tracked worker worktree plus the tower's own checkout) and its
# reconcile-backstop pass (REQ-A1.8) are not tunable here — only the grace is.
fleet_dirty_tree_threshold: 15m

# Push-based worker liveness: the five-state classifier and crash-loop
# backoff (fleet-autonomy D-1, D-2, D-3; REQ-A1.2, REQ-A1.4). All four
# resolve through the shared knob resolver (scripts/resolve-config-knob.sh
# -> config-get, D-22/REQ-G1.5) as positive integers; a malformed value
# follows the REQ-E1.4 by-layer policy. Consumed by scripts/fleet-liveness.sh.

# How many consecutive no-forward-progress observations (heartbeats with an
# unchanged progress token) classify a still-heartbeating worker as
# `flailing`, queueing the "this task may be stuck" human fork (REQ-A1.2,
# REQ-A1.3). No mature precedent exists for this exact signal (kickoff risk
# row 3): the default is deliberately small because a wrong value is safe —
# it only shifts WHEN the escalation fires, never loses work — and it is
# overlay-tunable to the fleet's real observation cadence.
fleet_flailing_threshold: 3

# Heartbeat age (seconds) past which a worker that should be working is
# treated as no longer heartbeating — the `hung` boundary (REQ-A1.2). Where
# a death-evidence handle is available the positive-evidence predicate
# (fleet-death-evidence.sh) corroborates before `hung` is classified; an
# `unknown` verdict refuses the classification (lost observability is never
# death, REQ-A1.7).
fleet_hung_heartbeat_seconds: 900

# Crash-loop backoff (REQ-A1.4, D-3): the first relaunch delay in seconds;
# each further consecutive crash doubles it (capped at 3600s) — the PM2 /
# supervisord exponential-backoff shape.
fleet_crash_backoff_base_seconds: 30

# Consecutive crashes after which the worker is DISABLED — no further
# relaunch authorized — and the disable is escalated to a human decision
# rather than restart-looping (REQ-A1.4). The default matches the 3-strike
# precedent D-3 cites (claude_code_agent_farm, supervisord startretries).
fleet_crash_disable_threshold: 3

# The tower crash-loop backoff schedule (fleet-autonomy D-4, REQ-A1.9), read
# by scripts/fleet-tower-watchdog.sh. After n consecutive failed relaunches
# the watchdog waits tower_relaunch_backoff_base * 2^(n-1) seconds before the
# next attempt, and disables itself (stops relaunching, with a decision-queue
# entry) once tower_relaunch_disable_threshold consecutive attempts have
# failed; a tower later observed alive re-arms it. These are the TOWER's own
# knobs (risk row 32): structurally identical to the worker crash-loop
# schedule (REQ-A1.4) but deliberately sharing no state or config with it —
# many workers, one tower per spec. Resolved through the shared knob resolver
# (scripts/resolve-config-knob.sh -> config-get, D-22/REQ-G1.5); a
# non-positive-integer value is malformed under the REQ-E1.4 by-layer policy.
tower_relaunch_backoff_base: 60
tower_relaunch_disable_threshold: 3

# Per-task-type model selection for fleet dispatch (fleet-autonomy D-11,
# REQ-E1.1). The rule table in scripts/fleet-resource-select.sh resolves one
# model/effort/command row per task type; the MODEL column reads these knobs
# through the shared resolver (scripts/resolve-config-knob.sh -> config-get,
# D-22/REQ-G1.5, the customization-overlay REQ-E1.4 by-layer malformed
# policy) so an overlay can
# route a tier to a different model without a code change. Legal values are
# the stable Claude Code model aliases (fable | opus | sonnet | haiku) —
# aliases, not dated model ids, so the enum survives model releases. Effort
# and command are fixed table cells (code, not config). Selection is
# deterministic table lookup: no LLM call is ever in the resolution path
# (D-18).
fleet_model_execution: opus
fleet_model_bookkeeping: sonnet
fleet_model_drain: sonnet

# Per-task-type reasoning effort and dispatch command (fleet-autonomy Task 10,
# D-24, REQ-E1.8). Task 7 made only the MODEL column overlay-tunable; Task 10
# extends the same shared-resolver treatment to effort and command so the whole
# selection policy is operator-configurable without a code change, shipped
# defaults preserving today's table (opt-in, default-preserving). Effort is one
# of (low medium high); command is one of the dispatch-entry set
# (execute-task orchestrate drain) — that enum is exactly the non-nestable set,
# so review-sequence disjointness (REQ-E1.2) holds by construction at every
# overlay layer, not just for these defaults.
fleet_effort_execution: high
fleet_effort_bookkeeping: medium
fleet_effort_drain: low
fleet_command_execution: execute-task
fleet_command_bookkeeping: orchestrate
fleet_command_drain: drain

# The bounded fallback hold, in seconds, when a native rate-limit signal is
# detected but its reset time cannot be parsed (fleet-autonomy D-12,
# REQ-E1.3; kickoff risk row 24). The rate-limit prompt is version-sensitive
# UI text, so an unparseable rendering degrades to this hold with a warning
# rather than pausing indefinitely, resuming immediately, or halting
# opaquely. Read by scripts/fleet-throttle.sh through the shared knob
# resolver (D-22/REQ-G1.5); a positive integer under the
# customization-overlay REQ-E1.4 by-layer malformed policy.
fleet_throttle_default_hold: 300

# The proactive, shared-aware `/usage` budget gate and its restriction ladder
# (fleet-autonomy Task 9, D-23/D-28; REQ-E1.5, REQ-E1.6). scripts/fleet-usage-gate.sh
# reads Claude Code's own `/usage` render, parses BOTH windows (session ~5-hour,
# weekly), and maps each window's percentage to a rung on the monotone ladder
# normal -> downshift -> reduce-concurrency -> defer-heavy -> defer-all. The more
# restrictive window governs; the session window is capped at defer-heavy while
# only weekly can reach defer-all. All knobs resolve through the shared resolver
# (scripts/resolve-config-knob.sh -> config-get, D-22/REQ-G1.5) under the
# customization-overlay REQ-E1.4 by-layer malformed policy; every value is a
# positive integer. The `downshift`/`reduce-concurrency` rung CONSEQUENCE values
# (which model/effort/concurrency) are fleet-autonomy Task 10's, not here.

# The read cadence and cache TTL, in seconds. `/usage` capture is expensive, so
# the signal is cached off the dispatch hot path and refreshed on the cadence,
# never scraped synchronously per dispatch. A cached signal staler than the TTL
# is treated as unavailable; the TTL MUST exceed the cadence (validated) so a
# fresh read always lands inside the TTL.
fleet_usage_read_cadence_seconds: 300
fleet_usage_signal_ttl_seconds: 900

# How many consecutive read cadences the signal may be unavailable before the
# REQUIRED operator surface fires (a warning escalating to an Awaiting-input
# hold via scripts/fleet-attention.sh), so a permanently broken `/usage` parse
# (the D-23 version-drift fragility) is never silent.
fleet_usage_sustained_loss_count: 3

# Per-window percentage thresholds mapping usage to a rung (>= at the threshold
# trips it). Each window's thresholds MUST be strictly ascending and within
# 1-100 (validated; a non-monotonic or out-of-range set is refused). The session
# window has no defer-all threshold — it is capped at defer-heavy by design (a
# session spike never proactively halts the fleet; the reactive backstop catches
# a genuine session wall). The weekly window escalates harder and earlier and
# alone can reach defer-all (hitting the weekly wall can halt work for days).
fleet_usage_session_downshift: 50
fleet_usage_session_reduce_concurrency: 70
fleet_usage_session_defer_heavy: 85
fleet_usage_weekly_downshift: 60
fleet_usage_weekly_reduce_concurrency: 75
fleet_usage_weekly_defer_heavy: 85
fleet_usage_weekly_defer_all: 95

# Restriction-ladder hysteresis and unavailable-signal decay (fleet-autonomy
# Task 10, D-25/D-28; REQ-E1.10). scripts/fleet-usage-gate.sh applies these so
# the ladder does not flap on a noisy read and does not pin the fleet at a
# restrictive rung against a signal it can no longer read. Both are positive
# integers (seconds) resolved through the shared resolver under the REQ-E1.4
# by-layer malformed policy; both measure from the audit-derived last-transition
# timestamp (D-28), so a memoryless relaunch computes the same window.

# The minimum dwell before a DESCEND (relaxing) rung transition: a rung is held
# at least this long after its last transition before it may step down, so a
# read oscillating across a threshold cannot flap the ladder. A CLIMB
# (restricting) is always immediate — restriction degrades capability only and
# never a safety floor, so engaging it promptly is safe.
fleet_usage_rung_min_dwell_seconds: 300

# The grace window during which the ladder holds its last-known rung while the
# `/usage` signal is unavailable, before decaying to `normal`. A transient
# scrape failure must not relax restriction; a persistent one must not pin the
# fleet at a restrictive rung forever (the reactive backstop remains the floor).
fleet_usage_unavailable_grace_seconds: 1800

# Budget-aware allocation: the restriction-ladder rung VALUES and per-tier budget
# caps (fleet-autonomy Task 10, D-24/D-25/D-28; REQ-E1.9, REQ-E1.10).
# scripts/fleet-allocate.sh reads the current rung (Task 9) and the raw usage
# signal and applies these to produce the EFFECTIVE model/effort/concurrency a
# dispatch uses. Every degrade step degrades CAPABILITY only — never below a full
# session-grade worker, never relaxing the determinism floor (REQ-G1.2), never
# engaging `--permission-mode auto` (REQ-E1.4). All knobs resolve through the
# shared resolver under the REQ-E1.4 by-layer malformed policy; the shipped
# defaults preserve today's behavior at the `normal` rung.

# The downshift-rung tier values: under `downshift` (and every heavier rung) no
# routine unit runs a model more expensive than `fleet_downshift_model` or an
# effort higher than `fleet_downshift_effort` (a clamp — a unit already at or
# below the cap is unchanged). Model is a Claude Code alias (fable opus sonnet
# haiku); effort is one of (low medium high).
fleet_downshift_model: sonnet
fleet_downshift_effort: medium

# The per-rung concurrency limit (max simultaneous workers): the full limit at
# `normal`/`downshift`, the reduced limit at `reduce-concurrency` and every
# heavier rung. Positive integers.
fleet_concurrency_normal: 3
fleet_concurrency_reduced: 1

# Per-tier budget caps as GLOBAL-USAGE THRESHOLDS (REQ-E1.9): the account-global
# usage percentage (1-100) at or above which a tier is withdrawn from ROUTINE
# units (a reserved unit is exempt — REQ-E1.10). The more expensive a tier, the
# LOWER its threshold, so expensive tiers drop out for routine work before
# cheaper tiers do (fable < opus < sonnet < haiku). A cap is a stateless
# threshold read against the shared signal, never per-model accounting or a
# reservation ledger (E1.5 forbids both); caps are inactive when the signal is
# unavailable. haiku's 100 means the cheapest tier is effectively never withdrawn
# (it is the session-grade floor). Validated within 1-100.
fleet_cap_fable: 55
fleet_cap_opus: 70
fleet_cap_sonnet: 90
fleet_cap_haiku: 100

# Credit-continuation spend policy at the rate-limit wall (fleet-autonomy
# D-27, REQ-E1.11). When Claude Code's wall offers a credit-continuation
# prompt ("spend credits / extra usage to continue past the limit"),
# scripts/fleet-credit-continuation.sh decides how the fleet responds. The
# shipped default is `false` — decline and wait for the window to reset (the
# REQ-E1.7 reactive backstop): auto-spend is NEVER the default, since an
# unattended, unbounded money spend is an irreversible action planwright
# reserves for the operator. Set `true` only to explicitly permit spending
# credits to keep the fleet moving past the limit. A spend-AVOIDANCE knob, not
# a spend-accounting ceiling (Out of scope): it neither meters nor caps spend.
# Resolved through the shared knob resolver (scripts/resolve-config-knob.sh ->
# config-get, D-22/REQ-G1.5); a value other than true/false is malformed under
# the customization-overlay REQ-E1.4 by-layer policy.
fleet_credit_continuation_spend: false

# Release-tagging policy (autopilot-reflex D-4, D-13; release-hardening D-7 —
# REQ-D1.4, REQ-D1.6, REQ-G1.3). The publish script (scripts/release-publish.sh)
# reads require_signed_tags, require_ci, and version_file; the comparator
# (scripts/release-pending.sh) reads only version_file — signing and the CI gate
# are publish-only concerns. See doctrine/release-tagging.md for the altitude
# split (the capability is core, these are the values).

# Signing policy for the release tag (D-4, REQ-D1.4). `auto` (default) signs when
# the repo has signing configured (git user.signingkey), otherwise creates an
# annotated UNSIGNED tag with a warning; `require` refuses to tag unless signing
# is configured and succeeds; `never` always creates an unsigned annotated tag.
# Signing is delegated entirely to the repo's git config (gpg.format,
# user.signingkey, gpg.ssh.program) — no signer is named in the script, and no
# signing material ever enters CI. planwright's own repo sets `require` through
# its repo-tracked overlay (.claude/planwright.yml); this default stays `auto` so
# a fresh adopter without signing configured still gets an annotated tag.
require_signed_tags: auto

# Whether publish requires positive GitHub CI confirmation on the release commit
# (release-hardening D-7, REQ-G1.3). `true` (default) preserves the strict gate:
# only a `green` verdict publishes, and a `none` verdict — no positive CI
# confirmation (no checks, only the excluded release-window lock, or all
# non-excluded checks NEUTRAL/SKIPPED) — refuses like every other non-green
# verdict. `false` relaxes ONLY that `none` verdict to allow publish (all three
# none sub-cases), emitting a stderr diagnostic naming require_ci=false so the
# deliberate relaxation leaves an audit signal; a failing, pending, unread-
# overflow (too-many), or CI-query-failure verdict stays fail-closed regardless.
# The value is validated as a boolean when the knob is read (unconditional of
# code path, symmetric with require_signed_tags); a non-boolean value is a clean
# fail-closed configuration error. Core opt-in with the default unchanged — the
# value is the adopter's overlay choice (an adopter with no CI sets false).
require_ci: true

# Where the version of truth lives (D-13, REQ-D1.6), as `<path>::<selector>`. The
# selector is `$.<key>` for a top-level JSON string field (extracted with jq, the
# key passed as data, never executed) or absent for a whole-file plain VERSION
# file. The `::` separator (not `#`) avoids config-get's YAML `#comment`
# stripping. The default reads $.version from the plugin manifest; override it to
# point at another top-level JSON string field (e.g. a package.json's $.version)
# or, with no selector, a plain VERSION file.
version_file: .claude-plugin/plugin.json::$.version

# Instruction-hygiene size budgets (prompt-hygiene D-1, D-2, D-5). The guard
# scripts/check-instructions.sh enforces these in words (wc -w, wrap-invariant);
# thresholds are boundary-inclusive (a count >= a threshold trips it). Defaults
# derive from the published 500-line SKILL.md authoring ceiling converted through
# the measured corpus density (~8.5 words/line in skills/, ~7.9 in doctrine/),
# recorded in D-2. Every knob is overlay-tunable; the mechanism is core, the
# values are style. See doctrine/instruction-hygiene.md for the budget model.
# Per-file floors (secondary signal): SKILL.md body and doctrine rule doc.
instruction_budget_skill_warn: 3000
instruction_budget_skill_error: 4250
instruction_budget_doctrine_warn: 2500
instruction_budget_doctrine_error: 4000
# Mandatory-at-start (the primary budget: SKILL.md body + run-start rule docs).
instruction_budget_startload_warn: 8000
instruction_budget_startload_error: 10000
# Reachable closure (start-load + point-of-use rule docs).
instruction_budget_closure_warn: 15000
instruction_budget_closure_error: 20000
# Per-surface headroom floors (instruction-headroom D-2, REQ-A1.1): the minimum
# word margin to the error threshold before the restoration ladder triggers, one
# per budgeted class (SKILL.md body / rule doc / mandatory-at-start / reachable
# closure), 5.0–6.25% of each error threshold. A surface whose margin is strictly
# below its floor is in breach — a named guard warning, never an error (D-2); the
# restoration target is twice the floor (D-3). Protective and overlay-tunable
# like the budget knobs, but excluded from the raise-rationale rule by suffix
# (raising a floor tightens headroom). See doctrine/instruction-hygiene.md.
instruction_budget_skill_floor: 250
instruction_budget_doctrine_floor: 250
instruction_budget_startload_floor: 500
instruction_budget_closure_floor: 1000
# Injected-context warn floor (static prose an additionalContext-emitting hook
# contributes, REQ-A1.4/B1.7). Warn-only: this partly-dynamic per-session
# surface never fails the check. Grounded in the ~40-word present surface
# (tool-discovery.sh) plus headroom, same test-and-measure discipline (D-13).
instruction_budget_injected_warn: 200
# Manifest-completeness assertion (prompt-hygiene REQ-A1.2, wired at Task 3). When
# true, every skills/*/SKILL.md must declare a doctrine manifest, so a manifest-less
# skill cannot silently under-report its start-load once manifests are the corpus
# norm. Distinct from the scoring rule (a manifest-less skill is still scored
# body-only) and the malformed-manifest error (REQ-B1.8). This repo ships all ten
# skills with manifests, so it is true here; an adopter not yet on the manifest
# convention can set it false (the assertion then does not fire) — absent in every
# layer it defaults off. Overlay-tunable; the mechanism is core.
instruction_manifest_completeness_required: true
