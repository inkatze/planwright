# fixture.conf — the kickoff eval fixture (operator-dialogue Task 6). Parsed as
# data: split on the first '=', no sourcing (mirrors prompt-eval.sh).
id=kickoff
# The interactive program the harness drives through a TTY. Relative to the
# fixture dir; resolved to an absolute path before launch.
skill=skill.sh
# Every persona models one operator profile / acceptance scenario. novice and
# expert are the persona pilots (REQ-B1.3/H1.4 divergence); malformed exercises
# input robustness (REQ-C1.5); undefined exercises completeness (REQ-C1.1, a
# required decision left undefined -> not ready); reopen exercises the
# changed-answer-reopens-dependents path (REQ-C1.2). Every persona writes a
# durable sign-off (undefined writes a blocked, ready:false one), so the on-demand
# suite runs green while the acceptance test asserts the discriminating behavior.
personas=novice expert malformed undefined reopen reopen-malformed
# The longest completing dialogue (reopen-malformed: level, decision, level-change,
# a garbage reopened-decision reprompt, the valid retry, sign-off) is six reads;
# the driver turn ceiling is turns+3, so 6 leaves headroom without masking a
# runaway.
turns=6
# The skill prints top-down, so its `EVAL-READY turn=N` anchor sits near the top
# of the pane; footer_lines spans the whole 50-row pane so the anchor is inside
# the scanned window (mirrors greeter). A real bottom-footer TUI keeps the
# default 8.
anchor=eval-ready
footer_lines=50
