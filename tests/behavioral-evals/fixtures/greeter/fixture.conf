# fixture.conf — the greeter behavioral-eval fixture (operator-dialogue Task 5).
# Parsed as data: split on the first '=', no sourcing (mirrors prompt-eval.sh).
id=greeter
# The interactive program the harness drives through a TTY. Relative to the
# fixture dir; resolved to an absolute path before launch.
skill=skill.sh
# The personas to run (space-separated); each names personas/<name>.persona.
personas=novice expert
# Turns the dialogue runs before the skill writes its sign-off — the driver's
# turn ceiling is derived from this plus a safety margin.
turns=3
# Per-session cost cap (USD). This fixture spends nothing (it is a local shell
# program, not a model session), but the cap is wired so the real Task-6 surface
# inherits the budget discipline.
max_budget_usd=0.10
# The idle anchor and the footer window the detector scans. This fixture's skill
# prints top-down, so its `EVAL-READY turn=N` anchor sits near the TOP of the
# pane, not the bottom; footer_lines spans the whole pane height (the harness
# launches a 50-row pane) so the anchor is inside the scanned window. A real
# bottom-footer TUI (Task 6) keeps the default 8.
anchor=eval-ready
footer_lines=50
