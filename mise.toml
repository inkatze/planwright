# planwright development toolchain. Dev-only: pins the quality tools and
# provides the local check tasks. planwright's runtime (scripts/, hooks, the
# validator) stays plain portable bash with no mise dependency (REQ-K1.5);
# this file exists so contributors and CI run identical tool versions
# (Task 2 wires the same tasks into GitHub Actions).

[tools]
shellcheck = "0.11.0"
shfmt = "3.13.1"
markdownlint-cli2 = "0.19.0"
yamllint = "1.37"
gitleaks = "8.30.0"

[tasks.release]
description = "Sign and publish the pending release tag on this repo (autopilot-reflex REQ-F1.3, D-8). Repo-local ergonomics only: a thin wrapper over scripts/release-publish.sh, which has no mise dependency and is invokable directly anywhere (REQ-D1.9)."
run = "scripts/release-publish.sh"

[tasks.release-arm]
description = "Arm the release watch-and-publish flow on this repo for a release PR (release-hardening REQ-F1.1, D-9). Repo-local ergonomics only: a thin wrapper over scripts/release-arm.sh forwarding the required <pr> argument, over a script that has no mise dependency and is invokable directly anywhere (autopilot-reflex REQ-D1.9)."
run = "scripts/release-arm.sh"

[tasks.test]
description = "Run the shell test suites under /bin/bash (the bash 3.2 floor), N files at a time via scripts/run-tests.sh (N = core count; PLANWRIGHT_TEST_JOBS overrides)"
run = '/bin/bash scripts/run-tests.sh'

[tasks.status]
description = "Render a spec bundle's derived execution status (the canonical read surface for format-version 2 bundles; invariant-tasks D-6). Usage: mise run status specs/<spec>"
run = "scripts/spec-status.sh"

[tasks."lint:shell"]
description = "shellcheck on scripts and tests"
run = "shellcheck scripts/*.sh tests/*.sh"

[tasks."lint:fmt"]
description = "shfmt diff check (style comes from .editorconfig; shfmt -w to fix)"
run = "shfmt -d scripts/*.sh tests/*.sh"

[tasks."lint:md"]
description = "markdownlint on prose (specs get the scoped specs/.markdownlint.jsonc relaxation; the _observations accumulator is data, excluded)"
run = "markdownlint-cli2 README.md 'doctrine/*.md' 'docs/*.md' 'skills/**/*.md' 'specs/**/*.md' '!specs/_observations/**'"

[tasks."lint:yaml"]
description = "yamllint on tracked config and workflows"
run = "yamllint --strict config/ .github/"

[tasks."lint:commits"]
description = "conventional-commit format lint on commits ahead of origin/main (length is enforced on the PR title in CI, not per-commit)"
run = '''
if ! git rev-parse --verify --quiet origin/main >/dev/null; then
  echo "lint:commits: origin/main not found; skipping (CI enforces the PR range)"
elif [ -n "$(git log --no-merges --format=%s origin/main..HEAD)" ]; then
  /bin/bash scripts/check-commit-msgs.sh origin/main..HEAD
else
  echo "lint:commits: no commits ahead of origin/main; nothing to lint"
fi
'''

[tasks."check:links"]
description = "doctrine cross-reference link-check"
run = "/bin/bash scripts/check-doc-links.sh"

[tasks."check:memory-links"]
description = "flag machine-local [[name]] memory links in committed spec files (REQ-D1.1, D-4)"
run = "/bin/bash scripts/check-memory-links.sh"

[tasks."check:specs"]
description = "planwright spec validator over specs/ (enforced; REQ-A2.1)"
run = '''
if [ ! -x scripts/spec-validate.sh ]; then
  echo "check:specs: scripts/spec-validate.sh missing or not executable" >&2
  exit 1
fi
/bin/bash scripts/spec-validate.sh specs/
'''

[tasks."lint:json"]
description = "validate the plugin + marketplace manifests, plugin-global hook registration, and the worker-settings permissions/hook fragment"
run = '''
set -e
jq . .claude-plugin/plugin.json >/dev/null
echo plugin.json valid
jq . .claude-plugin/marketplace.json >/dev/null
echo marketplace.json valid
jq . hooks/hooks.json >/dev/null
echo hooks.json valid
jq . config/worker-settings.json >/dev/null
echo worker-settings.json valid
'''

[tasks."lint:plugin-schema"]
description = "schema-deep plugin + marketplace manifest validation via `claude plugin validate` (the layer beneath lint:json's jq syntax check; degrades to a clean skip when the claude CLI is absent)"
run = "/bin/bash scripts/check-plugin-schema.sh"

[tasks."check:options"]
description = "options-reference coverage drift check (D-43)"
run = "/bin/bash scripts/check-options-reference.sh"

[tasks."check:ledger"]
description = "structural-corruption + duplicate-Status guards over committed tasks.md snapshots (REQ-E1.1, REQ-E1.2)"
run = "/bin/bash scripts/check-ledger.sh"

[tasks."check:obs"]
description = "observation fragment store guard: filename grammar, one-entry shape, UID uniqueness, no stray files (REQ-D1.4, REQ-A1.2, REQ-A1.3, REQ-A1.4)"
run = "/bin/bash scripts/check-obs.sh"

[tasks."check:instructions"]
description = "instruction-hygiene size guard: per-file / start-load / closure word budgets, manifest resolution, injected-context measurement, and the Task-8 closeout direction (no lingering pending-diet allowance) (prompt-hygiene Task 2, REQ-D1.4)"
run = "/bin/bash scripts/check-instructions.sh --closeout"

[tasks."check:no-ci-evals"]
description = "standing CI-exclusion guard: fail if a kept-eval task (the eval: namespace) is wired into any .github/workflows file, so evals never run in CI (prompt-hygiene Task 4, REQ-C1.6, D-8)"
run = "/bin/sh scripts/check-no-ci-evals.sh"

[tasks."eval:skill"]
description = "kept prompt-eval suite (on demand only, never in CI or `check`): pass^3 behavioral evals over instruction files via `claude -p --bare`; needs a Claude CLI + ANTHROPIC_API_KEY (prompt-hygiene Task 4, REQ-C1.4, D-6/D-7/D-8)"
run = "/bin/sh scripts/prompt-eval.sh --suite tests/prompt-evals/fixtures"

[tasks."obs:log"]
description = "render the observations chronological view on demand (derived, never committed; --archived to include consumed history; REQ-C1.4, D-4)"
run = "/bin/sh scripts/obs-render.sh"

[tasks."scan:secrets"]
description = "gitleaks over the full git history (redacted so a found secret never lands in logs)"
run = "gitleaks detect --no-banner --redact --source ."

[tasks.check]
description = "Everything: the local equivalent of the CI gate (.github/workflows/ci.yml runs the same tasks)"
depends = [
  "test",
  "lint:shell",
  "lint:fmt",
  "lint:md",
  "lint:yaml",
  "lint:json",
  "lint:plugin-schema",
  "lint:commits",
  "check:links",
  "check:memory-links",
  "check:options",
  "check:ledger",
  "check:obs",
  "check:instructions",
  "check:no-ci-evals",
  "check:specs",
  "scan:secrets",
]
