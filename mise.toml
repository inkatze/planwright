# planwright development toolchain. Dev-only: pins the quality tools and
# provides the local check tasks. planwright's runtime (scripts/, hooks, the
# validator) stays plain portable bash with no mise dependency (REQ-K1.5);
# this file exists so contributors and CI run identical tool versions
# (Task 2 wires the same tasks into GitHub Actions).

[tools]
shellcheck = "0.11.0"
markdownlint-cli2 = "0.19.0"
yamllint = "1.37"
gitleaks = "8.30.0"

[tasks.test]
description = "Run the shell test suites under /bin/bash (the bash 3.2 floor)"
run = 'for t in tests/*.sh; do /bin/bash "$t" || exit 1; done'

[tasks."lint:shell"]
description = "shellcheck on scripts and tests"
run = "shellcheck scripts/*.sh tests/*.sh"

[tasks."lint:md"]
description = "markdownlint on curated prose (doctrine, docs, README; specs excluded until Task 2 sets the config)"
run = "markdownlint-cli2 README.md 'doctrine/*.md' 'docs/*.md'"

[tasks."lint:yaml"]
description = "yamllint on tracked config"
run = "yamllint --strict config/"

[tasks."lint:json"]
description = "validate the plugin manifest"
run = "jq . .claude-plugin/plugin.json >/dev/null && echo plugin.json valid"

[tasks."check:options"]
description = "options-reference coverage drift check (D-43)"
run = "/bin/bash scripts/check-options-reference.sh"

[tasks."scan:secrets"]
description = "gitleaks over the full git history (redacted so a found secret never lands in logs)"
run = "gitleaks detect --no-banner --redact --source ."

[tasks.check]
description = "Everything: the local equivalent of the future CI gate"
depends = ["test", "lint:shell", "lint:md", "lint:yaml", "lint:json", "check:options", "scan:secrets"]
