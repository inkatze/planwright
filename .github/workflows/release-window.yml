---
# planwright untagged-window lock (autopilot-reflex Task 6; D-7; REQ-E1.1,
# REQ-E1.2, REQ-E1.3). A required status check that FAILS while `main` carries a
# version bump with no matching release tag (the untagged window) and PASSES
# otherwise. After a release PR merges, this check goes red on `main` and, via
# require-branches-up-to-date + the merge queue, on every other PR — so no
# further merge can land until the signed tag is published
# (scripts/release-publish.sh). Surfacing by forcing-function, never by pull
# (reflex step 4): forgetting to publish becomes structurally impossible.
#
# The lock is a property of `main`, so the check judges `main`'s state, not the
# PR head: it runs the PR checkout's script but passes `--ref origin/main`.
# Reading the PR head instead would re-create the chicken-and-egg D-7 rejects —
# the release PR bumps the version, so a head read would block the very PR that
# opens (and is about to close) the window. Reading a ref (rather than checking
# `main` out wholesale) also keeps the check working on the PR that first
# introduces the script, when `main` does not have it yet.
#
# This check reuses scripts/release-window-check.sh → the shared "pending"
# definition (release-pending.sh / release-lib.sh, REQ-D1.8). It needs only git
# (with tags) and jq, both present on ubuntu-latest; no signing material, no
# `gh`, no secret enters this workflow.
#
# "on" is quoted so yamllint's truthy rule (run on .github/) does not flag the
# key, matching ci.yml.
name: release-window

"on":
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-window-${{ github.ref }}
  cancel-in-progress: true

jobs:
  window-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Check out the PR/triggering ref so the check SCRIPT is present (it does
      # not yet live on main on the PR that introduces it). fetch-depth: 0
      # brings history; the explicit fetch below pins origin/main and the tags
      # the comparator needs.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # Pin origin/main (the STATE to judge) and the release tags. The explicit
      # refspec is required: actions/checkout configures a narrow fetch refspec
      # on pull_request/merge_group, so a bare `git fetch origin main` would not
      # populate refs/remotes/origin/main.
      - run: git fetch --force --tags origin +refs/heads/main:refs/remotes/origin/main

      # Fail (exit 1) if main is in the window, naming the publish command; pass
      # (exit 0) outside it; fail closed (exit 2) if the state cannot be read.
      - run: /bin/bash scripts/release-window-check.sh --ref origin/main
