---
# Untagged-window lock (opt-in adopter template; autopilot-reflex D-7,
# REQ-E1.1/E1.2/E1.3). A required status check that FAILS while your default
# branch carries a version bump with no matching release tag (the untagged
# window) and PASSES otherwise. Once a release PR merges, this check goes red on
# the default branch and — with require-branches-up-to-date (and, at higher
# concurrency, a merge queue) — on every other PR, so no further merge can land
# until the signed tag is published. Forgetting to publish becomes structurally
# impossible instead of merely discouraged.
#
# The lock is a property of the default branch, so this job evaluates that
# branch's state, never the PR head: on a pull_request or merge_group it checks
# out the BASE branch. Reading the PR head instead would block the very release
# PR that opens (and is about to close) the window — a chicken-and-egg the
# base-read avoids.
#
# REQUIRES a "pending" comparator. planwright core ships one
# (scripts/release-window-check.sh → scripts/release-pending.sh). If you adopt
# this WITHOUT planwright core, supply your own check that exits non-zero while
# your version of truth is ahead of the latest release tag and names your
# publish command, and point the final step at it.
#
# "on" is quoted so a yamllint truthy rule does not flag the key.
name: release-window

"on":
  pull_request:
  merge_group:
  push:
    branches: [main]  # your default branch

permissions:
  contents: read

concurrency:
  group: release-window-${{ github.ref }}
  cancel-in-progress: true

jobs:
  window-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Base-read the default branch's state. On push the base fallbacks are
      # empty and github.ref is already the pushed default branch. fetch-depth:
      # 0 brings the tags the comparator needs.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: >-
            ${{ github.event.pull_request.base.ref
            || github.event.merge_group.base_ref
            || github.ref }}
          fetch-depth: 0

      # Fail (exit 1) in the window, naming your publish command; pass (exit 0)
      # outside it; fail closed (exit 2) if the release state cannot be read.
      # Replace with your own comparator if not using planwright core.
      - run: /bin/bash scripts/release-window-check.sh
